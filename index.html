<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Cards</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <main class="app">
    <header class="header">
      <div>
        <p class="eyebrow">English Vocabulary</p>
        <h1>Life events cards</h1>
      </div>
      <button class="ghost-btn" id="shuffleBtn" title="Перемешать карточки">Shuffle</button>
    </header>

    <section class="panel">
      <div class="top-row">
        <div class="counter" id="counter">0 / 0</div>
        <select id="groupFilter" aria-label="Фильтр по группе">
          <option value="all">Все группы</option>
        </select>
      </div>

      <div class="progress"><div id="progressBar"></div></div>

      <article class="card" id="card" tabindex="0" role="button" aria-label="Карточка. Нажми, чтобы показать ответ">
        <div class="badge" id="groupBadge">Group</div>
        <div class="card-content">
          <p class="label">Word / phrase</p>
          <h2 id="word">Loading...</h2>

          <div class="answer hidden" id="answerBlock">
            <p class="label">Translation</p>
            <p class="translation" id="translation"></p>
            <p class="group-desc" id="groupDescription"></p>
          </div>
        </div>
      </article>

      <div class="buttons">
        <button class="secondary" id="prevBtn">← Назад</button>
        <button class="primary" id="showBtn">Показать ответ</button>
        <button class="secondary" id="nextBtn">Дальше →</button>
      </div>

      <p class="hint">Space — показать ответ · ← / → — переключать карточки</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
